<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>114下國中英語打地鼠小麥麥</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script src="words_en_hanlin_1.js"></script>
    <script src="words_en_hanlin_2.js"></script>
    <script src="words_en_hanlin_3.js"></script>
    <script src="words_en_kanghsuan_1.js"></script>
    <script src="words_en_kanghsuan_2.js"></script>
    <script src="words_en_kanghsuan_3.js"></script>
    <script src="words_en_nani_1.js"></script>
    <script src="words_en_nani_2.js"></script>
    <script src="words_en_nani_3.js"></script>
    
    <style>
        :root { --bg-grad-top: #a8e063; --bg-grad-bot: #56ab2f; --text-main: #2c3e50; --text-highlight: #8e44ad; --panel-bg: rgba(255,255,255,0.95); --panel-border: #27ae60; --sign-bg: #f1c40f; --sign-border: #e67e22; --sign-text: #2c3e50; --dash-text-1: #2980b9; --dash-text-2: #c0392b; }
        body[data-theme="by"] { --bg-grad-top: #000; --bg-grad-bot: #1a1a1a; --text-main: #ff0; --text-highlight: #ff0; --panel-bg: #000; --panel-border: #ff0; --sign-bg: #000; --sign-border: #ff0; --sign-text: #ff0; --dash-text-1: #ff0; --dash-text-2: #ff0; }
        body[data-theme="bw"] { --bg-grad-top: #000; --bg-grad-bot: #1a1a1a; --text-main: #fff; --text-highlight: #fff; --panel-bg: #000; --panel-border: #fff; --sign-bg: #000; --sign-border: #fff; --sign-text: #fff; --dash-text-1: #fff; --dash-text-2: #fff; }
        body[data-theme="bluey"] { --bg-grad-top: #00a; --bg-grad-bot: #006; --text-main: #ff0; --text-highlight: #ff0; --panel-bg: #000080; --panel-border: #ff0; --sign-bg: #000080; --sign-border: #ff0; --sign-text: #ff0; --dash-text-1: #ff0; --dash-text-2: #ff0; }
        
        body { font-family: 'Century Gothic', 'Arial', '微軟正黑體', sans-serif; background: linear-gradient(to bottom, var(--bg-grad-top), var(--bg-grad-bot)); color: var(--text-main); text-align: center; margin: 0; padding: 0; user-select: none; overflow: hidden; height: 100vh; display: flex; flex-direction: column; transition: background 0.3s;}
        
        /* ✨ RWD 彈性字體 */
        h1 { margin: 15px 0 5px; color: var(--text-highlight); font-size: clamp(1.5em, 5vw, 2.5em); text-shadow: 2px 2px 4px rgba(255,255,255,0.6); }
        .subtitle { font-size: clamp(1em, 3vw, 1.3em); margin-bottom: 15px; font-weight: bold; }
        
        .menu-container, #char-select-screen { background: var(--panel-bg); padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 800px; margin: 10px auto; border: 4px solid var(--panel-border); z-index: 10; position: relative; box-sizing: border-box; width: 95%;}
        .select-group { margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; }
        select { font-family: inherit; font-size: 1.2em; padding: 10px 15px; border-radius: 12px; border: 2px solid var(--panel-border); background-color: var(--panel-bg); color: var(--text-main); cursor: pointer; outline: none; min-width: 150px; font-weight: bold;}
        
        .contrast-btns { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap;}
        .theme-btn { font-family: inherit; padding: 8px 15px; font-size: 1.1em; font-weight: bold; border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .theme-btn:hover { transform: scale(1.05); }
        .t-default { background: #fff; color: #27ae60; border-color: #2ecc71; }
        
        .speed-control { background: rgba(0,0,0,0.03); padding: 10px 25px; border-radius: 15px; border: 2px dashed var(--panel-border); margin: 15px auto; max-width: 500px; display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap;}
        .speed-control label { font-size: 1.3em; font-weight: bold; color: var(--text-highlight);}
        input[type="range"] { width: 200px; cursor: pointer;}
        
        .btn { font-family: inherit; font-size: clamp(1em, 3vw, 1.3em); padding: clamp(8px, 2vh, 12px) clamp(15px, 4vw, 35px); background: var(--panel-border); color: #ffffff; border: 2px solid var(--panel-border); border-radius: 15px; cursor: pointer; font-weight: bold; margin: 5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);}
        .btn:disabled { opacity: 0.5; cursor: not-allowed;}
        
        .char-list-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 20px 0; max-height: 40vh; overflow-y: auto;}
        .target-pick-btn { font-family: inherit; font-size: 1.4em; padding: 12px 25px; border-radius: 20px; border: 3px solid var(--panel-border); background: var(--panel-bg); color: var(--text-main); cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        
        #game-screen { display: none; flex-direction: column; flex-grow: 1; position: relative; overflow: hidden; width: 100%; }
        .dashboard-bar { display: flex; justify-content: space-around; align-items: center; background: var(--panel-bg); padding: clamp(10px, 2vh, 15px) clamp(10px, 4vw, 30px); margin: 10px 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; z-index: 50; font-size: clamp(1.2em, 4vw, 1.6em); font-weight: bold; border: 3px solid var(--panel-border); flex-wrap: wrap;}
        .target-display { color: var(--text-main); font-size: clamp(1em, 3vw, 1.4em); background: var(--panel-bg); padding: 5px clamp(10px, 3vw, 25px); border-radius: 15px; border: 3px dashed var(--text-highlight);}
        
        /* 打地鼠網格設計 */
        #whack-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(10px, 2vw, 20px);
            width: 95%;
            max-width: 900px;
            margin: 10px auto;
            flex-grow: 1;
            padding-bottom: 80px;
        }

        .hole-container {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: clamp(150px, 25vh, 220px); 
            display: flex;
            justify-content: center;
            align-items: flex-end;
            /* 讓底部被裁切，左右不裁切，避免字被卡住 */
            overflow: visible;
            clip-path: inset(-100% -100% 0 -100%);
            -webkit-clip-path: inset(-100% -100% 0 -100%);
        }

        .dirt {
            position: absolute;
            bottom: 0;
            width: 120%;
            height: clamp(40px, 8vh, 60px);
            background: #795548;
            border-radius: 50% 50% 0 0;
            z-index: 10;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
            border-top: 5px solid #5d4037;
        }

        .mole {
            position: absolute;
            bottom: -250px; 
            display: flex;
            flex-direction: column; 
            align-items: center;
            z-index: 5;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
        }

        /* ✨ 升級後的自適應木牌 (RWD 防破圖) ✨ */
        .mole-sign {
            margin-bottom: clamp(-10px, -2vw, -15px); 
            padding: clamp(5px, 1vh, 8px) clamp(10px, 2vw, 25px);
            background: var(--sign-bg);
            border: clamp(2px, 0.6vw, 4px) solid var(--sign-border);
            border-radius: 30px;
            font-size: clamp(1rem, 3.5vw, 1.8rem); /* 字體隨螢幕動態縮放 */
            font-weight: bold;
            color: var(--sign-text);
            box-shadow: 0 5px 10px rgba(0,0,0,0.3), inset 0 0 10px rgba(255,255,255,0.4);
            cursor: pointer;
            
            /* 允許超級長的字換行，且不會超過網格的寬度 */
            max-width: 90%;
            white-space: normal; 
            word-break: break-word;
            line-height: 1.1;
            text-align: center;

            pointer-events: auto;
            position: relative;
            z-index: 15; 
            transition: background 0.1s, border-color 0.1s, color 0.1s, transform 0.1s;
        }

        .mole-emoji {
            font-size: clamp(3em, 8vw, 5.5em);
            line-height: 1;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
            position: relative;
            z-index: 5;
        }

        /* 動態彈出動畫 */
        @keyframes popUp {
            0% { bottom: -250px; }
            15% { bottom: clamp(30px, 5vh, 45px); }
            85% { bottom: clamp(30px, 5vh, 45px); }
            100% { bottom: -250px; }
        }

        .mole-active {
            animation: popUp var(--pop-duration, 3s) ease-in-out forwards;
        }

        .mole-sign:active { transform: scale(0.9); }
        
        .mole-sign.correct-hit { background: #27ae60 !important; color: #fff !important; border-color: #219653 !important; transform: scale(1.1); pointer-events: none;}
        .mole-sign.wrong-hit { background: #e74c3c !important; color: #fff !important; border-color: #c0392b !important; transform: scale(0.9); animation: shakeWrong 0.4s forwards; pointer-events: none;}
        
        @keyframes shakeWrong { 0%, 100% { transform: translateX(0) scale(0.9); } 20%, 60% { transform: translateX(-15px) scale(0.9); } 40%, 80% { transform: translateX(15px) scale(0.9); } }

        #pause-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 80; justify-content: center; align-items: center; font-size: clamp(3em, 8vw, 4em); font-weight: bold; color: #c0392b; text-shadow: 2px 2px 5px rgba(0,0,0,0.2); backdrop-filter: blur(3px);}
        #results-screen { display: none; position: absolute; top: 5%; left: 50%; transform: translateX(-50%); background: var(--panel-bg); padding: clamp(20px, 4vw, 40px); border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); z-index: 100; width: 90%; max-width: 700px; border: 5px solid var(--panel-border); color: var(--text-main);}
        .sentence-box { margin: 15px 0; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 15px; border-left: 5px solid var(--text-highlight); font-size: 1.1em; text-align: left; line-height: 1.5; color: var(--text-main);}

        @media (max-width: 480px) { 
            #whack-grid { grid-template-columns: repeat(2, 1fr); } 
        }

        /* ✅ 返回學員作品展示大廳：GitHub Pages 同層 index.html */
        .back-to-lobby {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 99999;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 10px 18px;
            background: #111827;
            color: #ffffff;
            border: 3px solid var(--text-highlight);
            border-radius: 999px;
            font-weight: 900;
            font-size: 1rem;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.35);
            pointer-events: auto;
            user-select: auto;
        }
        .back-to-lobby:hover {
            background: #2563eb;
            color: #ffffff;
            transform: translateY(-2px);
        }
        .back-to-lobby:focus {
            outline: 5px solid #ffff00;
            outline-offset: 4px;
        }
        @media (max-width: 640px) {
            .back-to-lobby {
                top: 10px;
                left: 10px;
                font-size: .95rem;
                padding: 8px 14px;
            }
        }
        @media print {
            .back-to-lobby {
                display: none !important;
            }
        }

    </style>
</head>
<body data-theme="default">

    <a href="index.html" class="back-to-lobby" aria-label="返回學員作品展示大廳">⬅ 返回大廳</a>


    <h1>🐹 114下國中英語打地鼠小麥麥</h1>
    <div class="subtitle">聽發音、看中文，敲擊舉著正確單字木牌的水豚吧！</div>

    <div id="start-screen" class="menu-container">
        <div class="contrast-btns">
            <button class="theme-btn t-default" onclick="setTheme('default')">綠地藍天</button>
            <button class="theme-btn t-by" onclick="setTheme('by')">黑底黃字</button>
            <button class="theme-btn t-bw" onclick="setTheme('bw')">黑底白字</button>
            <button class="theme-btn t-bluey" onclick="setTheme('bluey')">藍底黃字</button>
        </div>
        <h2 style="margin-top: 0;">1. 請選擇教材與設定速度</h2>
        <div class="select-group">
            <select id="publisher-select"><option value="">--選擇版本--</option></select>
            <select id="grade-select"><option value="">--選擇年級--</option></select>
            <select id="lesson-select"><option value="">--選擇課次--</option></select>
        </div>
        <div class="speed-control">
            <label>地鼠停留時間：</label>
            <input type="range" id="speed-slider" min="1" max="5" value="3" step="0.5" oninput="document.getElementById('speed-display').innerText = this.value + ' 秒'">
            <span id="speed-display">3 秒</span>
        </div>
        <button id="load-char-btn" class="btn" style="background:#27ae60;" onclick="showCharList()" disabled>2. 載入本課單字</button>
    </div>

    <div id="char-select-screen" style="display:none;">
        <h2 style="margin-top: 0;">請選擇要敲擊的目標單字</h2>
        <div id="char-list" class="char-list-grid"></div>
        <button class="btn" style="background:#95a5a6;" onclick="backToMenu()">返回重新選擇</button>
    </div>

    <div id="game-screen">
        <div class="dashboard-bar">
            <div>⏱️ <span id="time-val">0</span> 秒</div>
            <div>尋找：<span class="target-display" id="target-char">?</span></div>
            <div>🎯 剩餘：<span id="left-val" style="color: #27ae60;">10</span> 隻</div>
            <div id="lives-val">🐹🐹🐹🐹🐹</div>
        </div>
        
        <div id="whack-grid">
            </div>

        <div id="pause-overlay">遊戲暫停中</div>
        <div style="position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 90; pointer-events: none;">
            <button class="btn" style="background: #e74c3c; pointer-events: auto;" onclick="endGameEarly()">⏹️ 結束</button>
            <button id="pause-btn" class="btn" style="background: #f39c12; pointer-events: auto;" onclick="togglePause()">⏸️ 暫停</button>
        </div>
    </div>

    <div id="results-screen">
        <div id="res-title" style="font-size: 2.2em; margin-bottom: 10px; font-weight: bold;">🎓 測驗結算</div>
        <div class="sentence-box">
            <div style="display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 10px;">
                <strong style="font-size: 1.4em; color: var(--text-highlight);" id="res-char"></strong>
                <button class="btn" style="padding: 5px 15px; font-size: 0.8em; margin: 0; background: #3498db; border-color: #2980b9; color:#fff;" onclick="playSentence()">🔊 聽例句</button>
            </div>
            <div id="res-sentence" style="margin-top: 10px; font-weight: bold; text-align: center;"></div>
        </div>
        <div style="font-size: 1.4em; line-height: 1.8;">
            <div>⏱️ 總耗時：<span id="res-time"></span> 秒 | ✅ 成功敲擊：<span id="res-correct"></span> | ❌ 誤敲：<span id="res-wrong"></span></div>
        </div>
        <div style="font-size: 0.8em; margin-top: 10px; color: #7f8c8d;">📅 <span id="res-timestamp"></span></div>
        
        <div style="margin-top: 15px;"><input type="text" id="player-name" placeholder="請輸入您的姓名" style="font-size: 1.2em; padding: 10px; text-align: center; border-radius: 10px; border: 2px solid #ccc; width: 60%; max-width: 250px;"></div>
        
        <div style="margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
            <button class="btn" style="background: #27ae60; color:#fff;" onclick="takeScreenshot()">📸 成績截圖</button>
            <button class="btn" style="background: #3498db; color:#fff;" onclick="backToCharList()">⬅️ 回本課選單字</button>
            <button class="btn" style="background: #34495e; color:#fff;" onclick="backToLobby()">🏠 回遊戲大廳</button>
        </div>
    </div>

    <script>
        function setTheme(t) { document.body.setAttribute('data-theme', t); }
        let gameData = {}, currentLessonData = [], currentTargetObj = null, distractorPool = [];
        let timerInterval, spawnerInterval;
        // ✨ 初始化為 10
        let elapsedSeconds = 0, targetsLeft = 10, currentLives = 5.0, correctClicks = 0, wrongClicks = 0;
        let enVoice = null, zhVoice = null, isPaused = false;
        
        const numHoles = 9; 
        let activeMoles = [];

        window.onload = function() {
            if (typeof window.englishDb !== 'undefined') { gameData = window.englishDb; initMenu(); }
            loadVoices();
            if ('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged = loadVoices;
            buildGrid();
        };

        function buildGrid() {
            const grid = document.getElementById('whack-grid');
            grid.innerHTML = '';
            for(let i=0; i<numHoles; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole-container';
                hole.innerHTML = `
                    <div class="mole" id="mole-${i}">
                        <div class="mole-sign" id="sign-${i}">Word</div>
                        <div class="mole-emoji" id="emoji-${i}">🐹</div>
                    </div>
                    <div class="dirt"></div>
                `;
                grid.appendChild(hole);
            }
        }

        function loadVoices() {
            const vs = window.speechSynthesis.getVoices();
            enVoice = vs.find(v => v.lang === 'en-US' && (v.name.includes('Female') || v.name.includes('Zira') || v.name.includes('Samantha') || v.name.includes('Google US English'))) || vs.find(v => v.lang.startsWith('en')) || null;
            zhVoice = vs.find(v => v.lang === 'zh-TW' && (v.name.includes('Female') || v.name.includes('Xiaoxiao') || v.name.includes('Yating'))) || vs.find(v => v.lang.startsWith('zh')) || null;
        }

        function playDualVoice(enText, zhText) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            if (!enText) return;
            const enMsg = new SpeechSynthesisUtterance(enText);
            enMsg.lang = 'en-US'; enMsg.rate = 0.85; if (enVoice) enMsg.voice = enVoice;
            if (zhText) {
                enMsg.onend = () => { setTimeout(() => {
                    const zhMsg = new SpeechSynthesisUtterance(zhText);
                    zhMsg.lang = 'zh-TW'; zhMsg.rate = 0.95; if (zhVoice) zhMsg.voice = zhVoice;
                    window.speechSynthesis.speak(zhMsg);
                }, 50); };
            }
            window.speechSynthesis.speak(enMsg);
        }

        function playSentence() {
            if (!currentTargetObj) return;
            const fullText = currentTargetObj.sentence;
            const match = fullText.match(/^(.*?)\s*\((.*)\)$/);
            if (match) playDualVoice(match[1], match[2]); else playDualVoice(fullText, "");
        }

        function togglePause() {
            isPaused = !isPaused;
            const moles = document.querySelectorAll('.mole');
            const pBtn = document.getElementById('pause-btn'), overlay = document.getElementById('pause-overlay');
            if (isPaused) {
                pBtn.innerText = "▶️ 繼續"; pBtn.style.background = "#27ae60"; pBtn.style.borderColor = "#219653";
                clearInterval(timerInterval); clearInterval(spawnerInterval);
                moles.forEach(m => m.style.animationPlayState = 'paused');
                overlay.style.display = 'flex';
            } else {
                pBtn.innerText = "⏸️ 暫停"; pBtn.style.background = "#f39c12"; pBtn.style.borderColor = "#d68910";
                timerInterval = setInterval(() => { elapsedSeconds++; document.getElementById('time-val').innerText = elapsedSeconds; }, 1000);
                spawnerInterval = setInterval(spawnMole, 1200);
                moles.forEach(m => m.style.animationPlayState = 'running');
                overlay.style.display = 'none';
            }
        }

        function initMenu() {
            const pSel = document.getElementById('publisher-select');
            pSel.innerHTML = '<option value="">--選擇版本--</option>';
            for (let pub in gameData) pSel.add(new Option(pub + "版", pub));
            pSel.addEventListener('change', updateGrades);
            document.getElementById('grade-select').addEventListener('change', updateLessons);
            document.getElementById('lesson-select').addEventListener('change', checkLoadBtn);
        }

        function updateGrades() {
            const gSel = document.getElementById('grade-select'); gSel.innerHTML = '<option value="">--選擇年級--</option>';
            const pub = document.getElementById('publisher-select').value.replace("版", "");
            if (pub && gameData[pub]) Object.keys(gameData[pub]).forEach(g => gSel.add(new Option(g, g)));
        }

        function updateLessons() {
            const lSel = document.getElementById('lesson-select'); lSel.innerHTML = '<option value="">--選擇課次--</option>';
            const pub = document.getElementById('publisher-select').value.replace("版", ""), grade = document.getElementById('grade-select').value;
            if (gameData[pub] && gameData[pub][grade]) Object.keys(gameData[pub][grade]).forEach(l => lSel.add(new Option(l, l)));
        }

        function checkLoadBtn() {
            const pub = document.getElementById('publisher-select').value.replace("版", ""), grade = document.getElementById('grade-select').value, lesson = document.getElementById('lesson-select').value;
            if (lesson && gameData[pub]) { currentLessonData = gameData[pub][grade][lesson]; document.getElementById('load-char-btn').disabled = false; }
        }

        function showCharList() {
            document.getElementById('start-screen').style.display = 'none'; document.getElementById('char-select-screen').style.display = 'block';
            const cList = document.getElementById('char-list'); cList.innerHTML = "";
            currentLessonData.forEach(item => {
                const btn = document.createElement('button'); btn.className = 'target-pick-btn';
                btn.innerText = `${item.word} (${item.translate})`;
                btn.onclick = () => startGame(item); cList.appendChild(btn);
            });
        }

        function startGame(itemObj) {
            currentTargetObj = itemObj;
            distractorPool = currentLessonData.filter(w => w.word !== currentTargetObj.word);
            if (distractorPool.length === 0) distractorPool = [currentTargetObj];

            document.getElementById('char-select-screen').style.display = 'none'; document.getElementById('results-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex'; 
            
            isPaused = false; const pBtn = document.getElementById('pause-btn');
            pBtn.innerText = "⏸️ 暫停"; pBtn.style.background = "#f39c12"; pBtn.style.borderColor = "#d68910";
            document.getElementById('pause-overlay').style.display = 'none';
            
            // ✨ 10 隻過關
            targetsLeft = 10; currentLives = 5.0; correctClicks = 0; wrongClicks = 0; elapsedSeconds = 0; activeMoles = [];
            
            document.querySelectorAll('.mole').forEach(m => {
                m.classList.remove('mole-active');
                m.style.animation = 'none';
                m.style.bottom = '-250px';
            });
            
            document.getElementById('target-char').innerText = `${currentTargetObj.word} (${currentTargetObj.translate})`;
            updateDashboard();

            playDualVoice(currentTargetObj.word, currentTargetObj.translate);

            clearInterval(timerInterval); timerInterval = setInterval(() => { elapsedSeconds++; document.getElementById('time-val').innerText = elapsedSeconds; }, 1000);
            clearInterval(spawnerInterval); spawnerInterval = setInterval(spawnMole, 1200);
        }

        function spawnMole() {
            if (isPaused || targetsLeft <= 0 || currentLives <= 0) return;
            
            let freeHoles = [];
            for(let i=0; i<numHoles; i++) {
                if(!activeMoles.includes(i)) freeHoles.push(i);
            }
            if(freeHoles.length === 0) return;
            
            let chosenHole = freeHoles[Math.floor(Math.random() * freeHoles.length)];
            activeMoles.push(chosenHole);
            
            const isTarget = Math.random() < 0.45;
            let spawnObj = isTarget ? currentTargetObj : distractorPool[Math.floor(Math.random() * distractorPool.length)];
            
            const mole = document.getElementById(`mole-${chosenHole}`);
            const sign = document.getElementById(`sign-${chosenHole}`);
            const emoji = document.getElementById(`emoji-${chosenHole}`);
            
            mole.style.animation = '';
            mole.style.bottom = '';
            mole.style.animationPlayState = 'running';

            sign.innerText = spawnObj.word;
            sign.className = 'mole-sign'; 
            sign.style.background = '';
            sign.style.color = '';
            sign.style.borderColor = '';
            sign.dataset.clicked = 'false';
            
            emoji.innerText = '🐹'; 

            const popSec = parseFloat(document.getElementById('speed-slider').value);
            mole.style.setProperty('--pop-duration', `${popSec}s`);
            
            mole.classList.remove('mole-active');
            void mole.offsetWidth; 
            mole.classList.add('mole-active');
            
            const hitAction = function(e) {
                if (e.type === 'touchstart') { e.preventDefault(); }
                e.stopPropagation();
                if (isPaused || sign.dataset.clicked === 'true' || currentLives <= 0) return;
                
                sign.dataset.clicked = 'true';
                mole.style.animationPlayState = 'paused';

                playDualVoice(spawnObj.word, spawnObj.translate);

                if (spawnObj.word === currentTargetObj.word) {
                    sign.classList.add('correct-hit');
                    sign.innerText = '⭕ ' + spawnObj.word;
                    emoji.innerText = '🤩'; 
                    
                    correctClicks++; targetsLeft--; updateDashboard();
                    
                    setTimeout(() => {
                        mole.style.animation = 'none'; 
                        mole.style.bottom = '-250px'; 
                        if (targetsLeft <= 0) setTimeout(() => endGame(false, false), 800);
                        activeMoles = activeMoles.filter(h => h !== chosenHole);
                    }, 500); 

                } else {
                    sign.classList.add('wrong-hit');
                    sign.innerText = '❌ ' + spawnObj.word;
                    emoji.innerText = '😵'; 
                    
                    wrongClicks++; currentLives -= 0.5; updateDashboard(); checkGameOver();
                    
                    setTimeout(() => {
                        mole.style.animation = 'none';
                        mole.style.bottom = '-250px';
                        activeMoles = activeMoles.filter(h => h !== chosenHole);
                    }, 500);
                }
            };

            const oldClone = sign.cloneNode(true);
            sign.parentNode.replaceChild(oldClone, sign);
            const newSign = document.getElementById(`sign-${chosenHole}`);
            
            newSign.addEventListener('touchstart', hitAction, {passive: false});
            newSign.addEventListener('mousedown', (e) => { if (e.button === 0) hitAction(e); });

            mole.onanimationend = (e) => {
                if(e.animationName === 'popUp') {
                    if (newSign.dataset.clicked === 'false' && spawnObj.word === currentTargetObj.word) {
                        currentLives -= 1.0; updateDashboard(); checkGameOver();
                    }
                    mole.classList.remove('mole-active');
                    activeMoles = activeMoles.filter(h => h !== chosenHole);
                }
            };
        }

        function checkGameOver() { if (currentLives <= 0) { currentLives = 0; updateDashboard(); setTimeout(() => endGame(false, true), 300); } }
        function updateDashboard() {
            document.getElementById('left-val').innerText = Math.max(0, targetsLeft);
            let html = '';
            for(let i=0; i<Math.floor(currentLives); i++) html += '🐹';
            if(currentLives % 1 !== 0) html += '<span style="opacity:0.4;">🐹</span>';
            document.getElementById('lives-val').innerHTML = html;
        }

        function endGameEarly() { targetsLeft = 0; endGame(true, false); }
        function endGame(isEarly, isDeath) {
            clearInterval(timerInterval); clearInterval(spawnerInterval);
            
            document.querySelectorAll('.mole').forEach(m => {
                m.classList.remove('mole-active');
                m.style.animation = 'none';
                m.style.bottom = '-250px';
            });

            const titleEl = document.getElementById('res-title');
            if (isDeath) { playDualVoice("Game Over", "水豚命沒了，遊戲結束"); titleEl.innerHTML = "💀 遊戲結束"; titleEl.style.color = "#e74c3c"; }
            else if (isEarly) { playDualVoice("Finished", "測驗結束"); titleEl.innerHTML = "🎓 測驗結算"; titleEl.style.color = "var(--text-main)"; }
            else { playDualVoice("Excellent", "太棒了，過關！"); titleEl.innerHTML = "🌟 過關結算"; titleEl.style.color = "#27ae60"; }
            
            document.getElementById('res-char').innerText = `${currentTargetObj.word} (${currentTargetObj.translate})`;
            document.getElementById('res-sentence').innerText = currentTargetObj.sentence;
            document.getElementById('res-time').innerText = elapsedSeconds;
            document.getElementById('res-correct').innerText = correctClicks;
            document.getElementById('res-wrong').innerText = wrongClicks;
            document.getElementById('res-timestamp').innerText = new Date().toLocaleString('zh-TW', { hour12: false });
            
            document.getElementById('results-screen').style.display = 'block';
            setTimeout(() => { playSentence(); }, 2500);
        }

        function takeScreenshot() {
            const captureArea = document.getElementById('results-screen');
            html2canvas(captureArea, { backgroundColor: '#fff8ef', scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                let pName = document.getElementById('player-name').value.trim() || "玩家";
                link.download = `114下國中英文打地鼠_${currentTargetObj.word}_${pName}_成績.png`;
                link.href = canvas.toDataURL('image/png'); link.click();
            });
        }
        
        // ✨ 導航按鈕功能：回到本課字庫
        function backToCharList() { 
            document.getElementById('results-screen').style.display = 'none'; 
            window.speechSynthesis.cancel(); 
            showCharList(); 
        }

        // ✨ 導航按鈕功能：回到大廳
        function backToLobby() { 
            window.speechSynthesis.cancel(); 
            window.location.href = 'index.html'; 
        }

        // 畫面一開始的「返回重新選擇」按鈕
        function backToMenu() { 
            document.getElementById('char-select-screen').style.display = 'none'; 
            window.speechSynthesis.cancel(); 
            document.getElementById('start-screen').style.display = 'block'; 
        }
    </script>
</body>
</html>
