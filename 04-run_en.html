<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>114下國中英語跑酷小麥麥</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script src="words_en_hanlin_1.js"></script>
    <script src="words_en_hanlin_2.js"></script>
    <script src="words_en_hanlin_3.js"></script>
    <script src="words_en_kanghsuan_1.js"></script>
    <script src="words_en_kanghsuan_2.js"></script>
    <script src="words_en_kanghsuan_3.js"></script>
    <script src="words_en_nani_1.js"></script>
    <script src="words_en_nani_2.js"></script>
    <script src="words_en_nani_3.js"></script>
    
    <style>
        :root { --bg-grad-top: #8e44ad; --bg-grad-bot: #3498db; --text-main: #2c3e50; --text-highlight: #f1c40f; --panel-bg: rgba(255,255,255,0.95); --panel-border: #9b59b6; --road-bg: #34495e; --line-color: rgba(255,255,255,0.6); --sign-bg: #ecf0f1; --sign-border: #7f8c8d; --sign-text: #2c3e50; }
        body[data-theme="by"] { --bg-grad-top: #000; --bg-grad-bot: #1a1a1a; --text-main: #ff0; --text-highlight: #ff0; --panel-bg: #000; --panel-border: #ff0; --road-bg: #111; --line-color: #ff0; --sign-bg: #000; --sign-border: #ff0; --sign-text: #ff0; }
        body[data-theme="bw"] { --bg-grad-top: #000; --bg-grad-bot: #1a1a1a; --text-main: #fff; --text-highlight: #fff; --panel-bg: #000; --panel-border: #fff; --road-bg: #111; --line-color: #fff; --sign-bg: #000; --sign-border: #fff; --sign-text: #fff; }
        body[data-theme="bluey"] { --bg-grad-top: #00a; --bg-grad-bot: #006; --text-main: #ff0; --text-highlight: #ff0; --panel-bg: #000080; --panel-border: #ff0; --road-bg: #000040; --line-color: #ff0; --sign-bg: #000080; --sign-border: #ff0; --sign-text: #ff0; }
        
        body { font-family: 'Century Gothic', 'Arial', '微軟正黑體', sans-serif; background: linear-gradient(to bottom, var(--bg-grad-top), var(--bg-grad-bot)); color: var(--text-main); text-align: center; margin: 0; padding: 0; user-select: none; overflow: hidden; height: 100vh; display: flex; flex-direction: column; transition: background 0.3s;}
        
        /* ✨ RWD 彈性字體 */
        h1 { margin: 15px 0 5px; color: var(--text-highlight); font-size: clamp(1.5em, 5vw, 2.5em); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .subtitle { font-size: clamp(1em, 3vw, 1.3em); margin-bottom: 15px; font-weight: bold; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.5);}
        
        .menu-container, #char-select-screen { background: var(--panel-bg); padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-width: 800px; margin: 10px auto; border: 4px solid var(--panel-border); z-index: 10; position: relative; box-sizing: border-box; width: 95%;}
        .select-group { margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; }
        select { font-family: inherit; font-size: 1.2em; padding: 10px 15px; border-radius: 12px; border: 2px solid var(--panel-border); background-color: var(--panel-bg); color: var(--text-main); cursor: pointer; outline: none; min-width: 150px; font-weight: bold;}
        
        .contrast-btns { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap;}
        .theme-btn { font-family: inherit; padding: 8px 15px; font-size: 1.1em; font-weight: bold; border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .theme-btn:hover { transform: scale(1.05); }
        .t-default { background: #fff; color: #8e44ad; border-color: #9b59b6; }
        
        .speed-control { background: rgba(0,0,0,0.05); padding: 10px 25px; border-radius: 15px; border: 2px dashed var(--panel-border); margin: 15px auto; max-width: 500px; display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap;}
        .speed-control label { font-size: 1.3em; font-weight: bold; color: var(--text-highlight); text-shadow: 1px 1px 2px rgba(0,0,0,0.8);}
        input[type="range"] { width: 200px; cursor: pointer;}
        
        .btn { font-family: inherit; font-size: clamp(1em, 3vw, 1.3em); padding: clamp(8px, 2vh, 12px) clamp(15px, 4vw, 35px); background: var(--panel-border); color: #ffffff; border: 2px solid var(--panel-border); border-radius: 15px; cursor: pointer; font-weight: bold; margin: 5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);}
        .btn:disabled { opacity: 0.5; cursor: not-allowed;}
        
        .char-list-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 20px 0; max-height: 40vh; overflow-y: auto;}
        .target-pick-btn { font-family: inherit; font-size: 1.4em; padding: 12px 25px; border-radius: 20px; border: 3px solid var(--panel-border); background: var(--panel-bg); color: var(--text-main); cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        
        #game-screen { display: none; flex-direction: column; flex-grow: 1; position: relative; overflow: hidden; width: 100%; align-items: center;}
        .dashboard-bar { display: flex; justify-content: space-around; align-items: center; background: var(--panel-bg); padding: clamp(10px, 2vh, 15px) clamp(10px, 4vw, 30px); margin: 10px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative; z-index: 50; font-size: clamp(1.2em, 4vw, 1.6em); font-weight: bold; border: 3px solid var(--panel-border); flex-wrap: wrap; width: 95%; max-width: 900px;}
        .target-display { color: var(--text-main); font-size: clamp(1em, 3vw, 1.4em); background: var(--panel-bg); padding: 5px clamp(10px, 3vw, 25px); border-radius: 15px; border: 3px dashed var(--text-highlight);}
        
        /* 跑酷道路設計 */
        #road-container {
            position: relative; flex-grow: 1; width: 100%; max-width: 800px; margin-top: 10px;
            background-color: var(--road-bg);
            border-left: 8px solid var(--panel-border);
            border-right: 8px solid var(--panel-border);
            overflow: hidden;
            display: flex;
        }
        
        /* 三線道分隔線 */
        .lane-divider {
            position: absolute; top: 0; bottom: 0; width: clamp(4px, 1vw, 8px);
            background: repeating-linear-gradient(to bottom, var(--line-color) 0, var(--line-color) 40px, transparent 40px, transparent 80px);
            z-index: 2;
        }
        .ld-1 { left: 33.33%; transform: translateX(-50%); }
        .ld-2 { left: 66.66%; transform: translateX(-50%); }
        
        /* 道路捲動動畫 */
        .scroll-anim { animation: scrollLines 0.5s linear infinite; }
        @keyframes scrollLines { from { background-position: 0 0; } to { background-position: 0 80px; } }

        /* 車道點擊感應區 */
        .lane-clicker { flex: 1; z-index: 30; cursor: pointer; }
        
        /* 水豚玩家 */
        #player {
            position: absolute; bottom: 15%; width: 33.33%; text-align: center;
            font-size: clamp(3.5em, 10vw, 6em); z-index: 20; transition: left 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); pointer-events: none;
        }

        /* ✨ 掉落的單字看板 RWD 防破圖 ✨ */
        .sign-wrapper { position: absolute; width: 33.33%; text-align: center; z-index: 10; pointer-events: none;}
        .sign-content {
            display: flex; align-items: center; justify-content: center;
            width: 85%; margin: 0 auto;
            padding: clamp(5px, 1.5vh, 15px) clamp(5px, 1vw, 10px);
            background: var(--sign-bg); border: clamp(2px, 0.6vw, 4px) solid var(--sign-border); border-radius: 20px;
            font-size: clamp(1rem, 3.5vw, 2.2rem); font-weight: bold; color: var(--sign-text);
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            white-space: normal; word-wrap: break-word; line-height: 1.1; 
            min-height: clamp(40px, 8vh, 80px);
            transition: background 0.1s, color 0.1s, border-color 0.1s, transform 0.1s;
        }

        /* 視覺回饋 */
        .sign-content.correct-hit { background: #27ae60 !important; color: #fff !important; border-color: #219653 !important; transform: scale(1.1); }
        .sign-content.wrong-hit { background: #e74c3c !important; color: #fff !important; border-color: #c0392b !important; transform: scale(0.9); }

        #damage-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(231, 76, 60, 0.5); z-index: 60; opacity: 0; pointer-events: none; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; font-size: clamp(3em, 8vw, 5em); font-weight: bold; color: #fff; text-shadow: 0 0 20px #000;}

        #pause-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 80; justify-content: center; align-items: center; font-size: clamp(3em, 8vw, 4em); font-weight: bold; color: #8e44ad; text-shadow: 2px 2px 5px rgba(0,0,0,0.2); backdrop-filter: blur(3px);}
        #results-screen { display: none; position: absolute; top: 5%; left: 50%; transform: translateX(-50%); background: var(--panel-bg); padding: clamp(20px, 4vw, 40px); border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); z-index: 100; width: 90%; max-width: 700px; border: 5px solid var(--panel-border); color: var(--text-main);}
        .sentence-box { margin: 15px 0; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 15px; border-left: 5px solid var(--text-highlight); font-size: 1.1em; text-align: left; line-height: 1.5; color: var(--text-main);}

        @media (max-width: 768px) { h1 { margin-top: 10px; } }
    </style>
</head>
<body data-theme="default">

    <h1>🐹 114下國中英語跑酷小麥麥</h1>
    <div class="subtitle">點擊左中右車道操控水豚，吃掉正確單字、躲開錯誤干擾！</div>

    <div id="start-screen" class="menu-container">
        <div class="contrast-btns">
            <button class="theme-btn t-default" onclick="setTheme('default')">紫夜星空</button>
            <button class="theme-btn t-by" onclick="setTheme('by')">黑底黃字</button>
            <button class="theme-btn t-bw" onclick="setTheme('bw')">黑底白字</button>
            <button class="theme-btn t-bluey" onclick="setTheme('bluey')">藍底黃字</button>
        </div>
        <h2 style="margin-top: 0;">1. 請選擇教材與設定速度</h2>
        <div class="select-group">
            <select id="publisher-select"><option value="">--選擇版本--</option></select>
            <select id="grade-select"><option value="">--選擇年級--</option></select>
            <select id="lesson-select"><option value="">--選擇課次--</option></select>
        </div>
        <div class="speed-control">
            <label>看板掉落速度：</label>
            <input type="range" id="speed-slider" min="3" max="15" value="7" oninput="document.getElementById('speed-display').innerText = 'Lv ' + this.value">
            <span id="speed-display" style="color: #fff;">Lv 7</span>
        </div>
        <button id="load-char-btn" class="btn" style="background:#27ae60;" onclick="showCharList()" disabled>2. 載入本課單字</button>
    </div>

    <div id="char-select-screen" style="display:none;">
        <h2 style="margin-top: 0;">請選擇要吃掉的目標單字</h2>
        <div id="char-list" class="char-list-grid"></div>
        <button class="btn" style="background:#95a5a6;" onclick="backToMenu()">返回重新選擇</button>
    </div>

    <div id="game-screen">
        <div class="dashboard-bar">
            <div>⏱️ <span id="time-val">0</span> 秒</div>
            <div>目標：<span class="target-display" id="target-char">?</span></div>
            <div>🎯 剩餘：<span id="left-val" style="color: #27ae60;">10</span> 個</div>
            <div id="lives-val">🐹🐹🐹🐹🐹</div>
        </div>
        
        <div id="road-container">
            <div class="lane-divider ld-1 scroll-anim" id="ld1"></div>
            <div class="lane-divider ld-2 scroll-anim" id="ld2"></div>
            
            <div class="lane-clicker" onclick="setPlayerLane(0)"></div>
            <div class="lane-clicker" onclick="setPlayerLane(1)"></div>
            <div class="lane-clicker" onclick="setPlayerLane(2)"></div>
            
            <div id="player" style="left: 33.33%;">🐹</div>
        </div>

        <div id="damage-flash">Missed!</div>
        <div id="pause-overlay">遊戲暫停中</div>

        <div style="position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 90; pointer-events: none;">
            <button class="btn" style="background: #e74c3c; pointer-events: auto;" onclick="endGameEarly()">⏹️ 結束</button>
            <button id="pause-btn" class="btn" style="background: #f39c12; pointer-events: auto;" onclick="togglePause()">⏸️ 暫停</button>
        </div>
    </div>

    <div id="results-screen">
        <div id="res-title" style="font-size: 2.2em; margin-bottom: 10px; font-weight: bold;">🎓 測驗結算</div>
        <div class="sentence-box">
            <div style="display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 10px;">
                <strong style="font-size: 1.4em; color: var(--text-highlight);" id="res-char"></strong>
                <button class="btn" style="padding: 5px 15px; font-size: 0.8em; margin: 0; background: #3498db; border-color: #2980b9;" onclick="playSentence()">🔊 聽例句</button>
            </div>
            <div id="res-sentence" style="margin-top: 10px; font-weight: bold; text-align: center;"></div>
        </div>
        <div style="font-size: 1.4em; line-height: 1.8;">
            <div>⏱️ 總耗時：<span id="res-time"></span> 秒 | ✅ 正確吃掉：<span id="res-correct"></span> | ❌ 誤吃/漏吃：<span id="res-wrong"></span></div>
        </div>
        <div style="font-size: 0.8em; margin-top: 10px; color: #7f8c8d;">📅 <span id="res-timestamp"></span></div>
        
        <div style="margin-top: 15px;"><input type="text" id="player-name" placeholder="請輸入您的姓名" style="font-size: 1.2em; padding: 10px; text-align: center; border-radius: 10px; border: 2px solid #ccc; width: 60%;"></div>
        
        <div style="margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
            <button class="btn" style="background: #27ae60;" onclick="takeScreenshot()">📸 成績截圖</button>
            <button class="btn" style="background: #3498db;" onclick="backToCharList()">⬅️ 回本課選單字</button>
            <button class="btn" style="background: #34495e;" onclick="backToLobby()">🏠 回遊戲大廳</button>
        </div>
    </div>

    <script>
        function setTheme(t) { document.body.setAttribute('data-theme', t); }
        let gameData = {}, currentLessonData = [], currentTargetObj = null, distractorPool = [];
        let timerInterval, physicsInterval, spawnerInterval;
        // ✨ 修改預設目標為 10
        let elapsedSeconds = 0, targetsLeft = 10, currentLives = 5.0, correctClicks = 0, wrongClicks = 0;
        let enVoice = null, zhVoice = null, isPaused = false;
        
        let signs = []; 
        let playerLane = 1; 

        let voiceQueue = [];
        let isSpeaking = false;

        window.onload = function() {
            if (typeof window.englishDb !== 'undefined') { gameData = window.englishDb; initMenu(); }
            loadVoices();
            if ('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged = loadVoices;
            
            window.addEventListener('keydown', (e) => {
                if (isPaused) return;
                if (e.key === 'ArrowLeft') setPlayerLane(Math.max(0, playerLane - 1));
                if (e.key === 'ArrowRight') setPlayerLane(Math.min(2, playerLane + 1));
            });
        };

        function setPlayerLane(lane) {
            if(isPaused || currentLives <= 0) return;
            playerLane = lane;
            const percentages = ['0%', '33.33%', '66.66%'];
            document.getElementById('player').style.left = percentages[lane];
        }

        function loadVoices() {
            const vs = window.speechSynthesis.getVoices();
            enVoice = vs.find(v => v.lang === 'en-US' && (v.name.includes('Female') || v.name.includes('Zira') || v.name.includes('Samantha') || v.name.includes('Google US English'))) || vs.find(v => v.lang.startsWith('en')) || null;
            zhVoice = vs.find(v => v.lang === 'zh-TW' && (v.name.includes('Female') || v.name.includes('Xiaoxiao') || v.name.includes('Yating'))) || vs.find(v => v.lang.startsWith('zh')) || null;
        }

        function processVoiceQueue() {
            if (voiceQueue.length === 0) { isSpeaking = false; return; }
            isSpeaking = true;
            const { en, zh, isFast } = voiceQueue.shift();
            
            const enMsg = new SpeechSynthesisUtterance(en);
            enMsg.lang = 'en-US'; 
            enMsg.rate = isFast ? 1.2 : 0.85; 
            if (enVoice) enMsg.voice = enVoice;
            
            enMsg.onend = () => {
                if(zh) {
                    setTimeout(() => {
                        const zhMsg = new SpeechSynthesisUtterance(zh);
                        zhMsg.lang = 'zh-TW'; 
                        zhMsg.rate = isFast ? 1.3 : 0.95; 
                        if (zhVoice) zhMsg.voice = zhVoice;
                        zhMsg.onend = () => { processVoiceQueue(); };
                        window.speechSynthesis.speak(zhMsg);
                    }, 10); 
                } else {
                    processVoiceQueue();
                }
            };
            window.speechSynthesis.speak(enMsg);
        }

        function playDualVoice(enText, zhText, isFast = true) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel(); 
            voiceQueue = []; 
            isSpeaking = false;
            voiceQueue.push({en: enText, zh: zhText, isFast: isFast});
            processVoiceQueue();
        }

        function playSentence() {
            if (!currentTargetObj) return;
            const fullText = currentTargetObj.sentence;
            const match = fullText.match(/^(.*?)\s*\((.*)\)$/);
            if (match) playDualVoice(match[1], match[2], false); else playDualVoice(fullText, "", false);
        }

        function togglePause() {
            isPaused = !isPaused;
            const pBtn = document.getElementById('pause-btn'), overlay = document.getElementById('pause-overlay');
            const lines = document.querySelectorAll('.lane-divider');
            if (isPaused) {
                pBtn.innerText = "▶️ 繼續"; pBtn.style.background = "#27ae60"; pBtn.style.borderColor = "#219653";
                clearInterval(timerInterval); clearInterval(physicsInterval); clearInterval(spawnerInterval);
                lines.forEach(l => l.style.animationPlayState = 'paused');
                overlay.style.display = 'flex';
            } else {
                pBtn.innerText = "⏸️ 暫停"; pBtn.style.background = "#f39c12"; pBtn.style.borderColor = "#d68910";
                timerInterval = setInterval(() => { elapsedSeconds++; document.getElementById('time-val').innerText = elapsedSeconds; }, 1000);
                physicsInterval = setInterval(updatePhysics, 20);
                
                const speedLvl = parseInt(document.getElementById('speed-slider').value, 10);
                const spawnRate = Math.max(800, 3000 - speedLvl * 150);
                spawnerInterval = setInterval(spawnSign, spawnRate);
                
                lines.forEach(l => l.style.animationPlayState = 'running');
                overlay.style.display = 'none';
            }
        }

        function initMenu() {
            const pSel = document.getElementById('publisher-select');
            pSel.innerHTML = '<option value="">--選擇版本--</option>';
            for (let pub in gameData) pSel.add(new Option(pub + "版", pub));
            pSel.addEventListener('change', updateGrades);
            document.getElementById('grade-select').addEventListener('change', updateLessons);
            document.getElementById('lesson-select').addEventListener('change', checkLoadBtn);
        }

        function updateGrades() {
            const gSel = document.getElementById('grade-select'); gSel.innerHTML = '<option value="">--選擇年級--</option>';
            const pub = document.getElementById('publisher-select').value.replace("版", "");
            if (pub && gameData[pub]) Object.keys(gameData[pub]).forEach(g => gSel.add(new Option(g, g)));
        }

        function updateLessons() {
            const lSel = document.getElementById('lesson-select'); lSel.innerHTML = '<option value="">--選擇課次--</option>';
            const pub = document.getElementById('publisher-select').value.replace("版", ""), grade = document.getElementById('grade-select').value;
            if (gameData[pub] && gameData[pub][grade]) Object.keys(gameData[pub][grade]).forEach(l => lSel.add(new Option(l, l)));
        }

        function checkLoadBtn() {
            const pub = document.getElementById('publisher-select').value.replace("版", ""), grade = document.getElementById('grade-select').value, lesson = document.getElementById('lesson-select').value;
            if (lesson && gameData[pub]) { currentLessonData = gameData[pub][grade][lesson]; document.getElementById('load-char-btn').disabled = false; }
        }

        function showCharList() {
            document.getElementById('start-screen').style.display = 'none'; document.getElementById('char-select-screen').style.display = 'block';
            const cList = document.getElementById('char-list'); cList.innerHTML = "";
            currentLessonData.forEach(item => {
                const btn = document.createElement('button'); btn.className = 'target-pick-btn';
                btn.innerText = `${item.word} (${item.translate})`;
                btn.onclick = () => startGame(item); cList.appendChild(btn);
            });
        }

        function startGame(itemObj) {
            currentTargetObj = itemObj;
            distractorPool = currentLessonData.filter(w => w.word !== currentTargetObj.word);
            if (distractorPool.length === 0) distractorPool = [currentTargetObj];

            document.getElementById('char-select-screen').style.display = 'none'; document.getElementById('results-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex'; 
            
            isPaused = false; const pBtn = document.getElementById('pause-btn');
            pBtn.innerText = "⏸️ 暫停"; pBtn.style.background = "#f39c12"; pBtn.style.borderColor = "#d68910";
            document.getElementById('pause-overlay').style.display = 'none';
            document.querySelectorAll('.lane-divider').forEach(l => l.style.animationPlayState = 'running');
            
            // ✨ 初始化為 10 關
            targetsLeft = 10; currentLives = 5.0; correctClicks = 0; wrongClicks = 0; elapsedSeconds = 0;
            signs.forEach(s => s.wrapper.remove()); signs = [];
            setPlayerLane(1); 

            window.speechSynthesis.cancel(); 

            document.getElementById('target-char').innerText = `${currentTargetObj.word} (${currentTargetObj.translate})`;
            updateDashboard();

            playDualVoice(currentTargetObj.word, currentTargetObj.translate, true);

            clearInterval(timerInterval); timerInterval = setInterval(() => { elapsedSeconds++; document.getElementById('time-val').innerText = elapsedSeconds; }, 1000);
            clearInterval(physicsInterval); physicsInterval = setInterval(updatePhysics, 20); 
            
            const speedLvl = parseInt(document.getElementById('speed-slider').value, 10);
            const spawnRate = Math.max(800, 3000 - speedLvl * 150);
            clearInterval(spawnerInterval); spawnerInterval = setInterval(spawnSign, spawnRate);
        }

        function spawnSign() {
            if (isPaused || currentLives <= 0 || targetsLeft <= 0) return;
            
            const lane = Math.floor(Math.random() * 3);
            const isTarget = Math.random() < 0.45;
            let spawnObj = isTarget ? currentTargetObj : distractorPool[Math.floor(Math.random() * distractorPool.length)];
            
            const wrapper = document.createElement('div');
            wrapper.className = 'sign-wrapper';
            wrapper.style.left = ['0%', '33.33%', '66.66%'][lane];
            wrapper.style.top = '-100px';

            const content = document.createElement('div');
            content.className = 'sign-content';
            content.innerText = spawnObj.word;
            
            wrapper.appendChild(content);
            document.getElementById('road-container').appendChild(wrapper);
            
            signs.push({
                wrapper: wrapper, content: content, obj: spawnObj,
                y: -100, lane: lane, handled: false
            });
        }

        function updatePhysics() {
            const speedLvl = parseInt(document.getElementById('speed-slider').value, 10);
            const fallSpeed = 2 + speedLvl * 0.5; 
            
            const road = document.getElementById('road-container');
            const player = document.getElementById('player');
            
            const roadH = road.offsetHeight;
            const playerTop = player.offsetTop;
            const playerBottom = playerTop + player.offsetHeight;
            
            for(let i = signs.length - 1; i >= 0; i--) {
                let s = signs[i];
                if (s.handled && s.wrapper.style.opacity === "0") continue;

                s.y += fallSpeed;
                s.wrapper.style.top = s.y + 'px';
                
                let signTop = s.y;
                let signBottom = s.y + s.wrapper.offsetHeight;
                
                // 判定碰撞
                if (!s.handled && signBottom > playerTop + 20 && signTop < playerBottom - 20) {
                    if (s.lane === playerLane) {
                        s.handled = true;
                        playDualVoice(s.obj.word, s.obj.translate, true);
                        
                        if (s.obj.word === currentTargetObj.word) {
                            s.content.classList.add('correct-hit');
                            s.content.innerText = '⭕ ' + s.obj.word;
                            targetsLeft--; correctClicks++; updateDashboard();
                            
                            setTimeout(() => { s.wrapper.style.opacity = 0; }, 150);
                            if (targetsLeft <= 0) setTimeout(() => endGame(false, false), 800);
                        } else {
                            s.content.classList.add('wrong-hit');
                            s.content.innerText = '❌ ' + s.obj.word;
                            currentLives -= 0.5; wrongClicks++; updateDashboard();
                            flashScreen("Wrong!");
                            
                            setTimeout(() => { s.wrapper.style.opacity = 0; }, 150);
                            checkGameOver();
                        }
                    }
                }
                
                // 漏吃目標判定
                if (s.y > roadH) {
                    if (!s.handled) {
                        if (s.obj.word === currentTargetObj.word) {
                            playDualVoice(s.obj.word, "漏掉了", true);
                            currentLives -= 0.5; wrongClicks++; updateDashboard();
                            flashScreen("Missed!");
                            checkGameOver();
                        }
                    }
                    s.wrapper.remove();
                    signs.splice(i, 1);
                }
            }
        }

        function flashScreen(msg) {
            const f = document.getElementById('damage-flash');
            f.innerText = msg;
            f.style.opacity = 1;
            setTimeout(() => { f.style.opacity = 0; }, 300);
        }

        function checkGameOver() { if (currentLives <= 0) { currentLives = 0; updateDashboard(); setTimeout(() => endGame(false, true), 300); } }
        function updateDashboard() {
            document.getElementById('left-val').innerText = Math.max(0, targetsLeft);
            let html = '';
            for(let i=0; i<Math.floor(currentLives); i++) html += '🐹';
            if(currentLives % 1 !== 0) html += '<span style="opacity:0.4;">🐹</span>';
            document.getElementById('lives-val').innerHTML = html;
        }

        function endGameEarly() { targetsLeft = 0; endGame(true, false); }
        function endGame(isEarly, isDeath) {
            clearInterval(timerInterval); clearInterval(physicsInterval); clearInterval(spawnerInterval);
            document.querySelectorAll('.lane-divider').forEach(l => l.style.animationPlayState = 'paused');
            
            signs.forEach(s => s.wrapper.remove()); signs = [];

            const titleEl = document.getElementById('res-title');
            if (isDeath) { playDualVoice("Game Over", "水豚命沒了，遊戲結束", false); titleEl.innerHTML = "💀 遊戲結束"; titleEl.style.color = "#e74c3c"; }
            else if (isEarly) { playDualVoice("Finished", "測驗結束", false); titleEl.innerHTML = "🎓 測驗結算"; titleEl.style.color = "var(--text-main)"; }
            else { playDualVoice("Excellent", "太棒了，過關！", false); titleEl.innerHTML = "🌟 過關結算"; titleEl.style.color = "#27ae60"; }
            
            document.getElementById('res-char').innerText = `${currentTargetObj.word} (${currentTargetObj.translate})`;
            document.getElementById('res-sentence').innerText = currentTargetObj.sentence;
            document.getElementById('res-time').innerText = elapsedSeconds;
            document.getElementById('res-correct').innerText = correctClicks;
            document.getElementById('res-wrong').innerText = wrongClicks;
            document.getElementById('res-timestamp').innerText = new Date().toLocaleString('zh-TW', { hour12: false });
            
            document.getElementById('results-screen').style.display = 'block';
            setTimeout(() => { playSentence(); }, 2500);
        }

        function takeScreenshot() {
            const captureArea = document.getElementById('results-screen');
            html2canvas(captureArea, { backgroundColor: '#fff8ef', scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                let pName = document.getElementById('player-name').value.trim() || "玩家";
                link.download = `114下國中英文跑酷_${currentTargetObj.word}_${pName}_成績.png`;
                link.href = canvas.toDataURL('image/png'); link.click();
            });
        }
        
        // ✨ 導航按鈕功能：回到選擇頁面
        function backToCharList() { 
            document.getElementById('results-screen').style.display = 'none'; 
            window.speechSynthesis.cancel(); 
            showCharList(); 
        }

        // ✨ 導航按鈕功能：回到大廳
        function backToLobby() { 
            window.speechSynthesis.cancel(); 
            window.location.href = 'index.html'; 
        }

        // 回主選單 (開始畫面的返回按鈕)
        function backToMenu() { 
            document.getElementById('char-select-screen').style.display = 'none'; 
            window.speechSynthesis.cancel(); 
            document.getElementById('start-screen').style.display = 'block'; 
        }
    </script>
</body>
</html>
